name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  # ── Rust workspace ───────────────────────────────────────────────────────────
  rust:
    name: Rust (check · test · clippy · fmt)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system libraries (Bevy + Wayland + ALSA)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libwayland-dev \
            libudev-dev \
            libxkbcommon-dev \
            libxi-dev \
            libx11-dev \
            libasound2-dev

      # rust-toolchain.toml pins the toolchain; rustup picks it up automatically.
      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Type-check (all crates)
        run: cargo check --workspace

      - name: Test (non-Bevy crates)
        run: |
          cargo test --workspace \
            --exclude novaforge_game \
            --exclude novaforge_game_app \
            --exclude novaforge_world \
            --exclude novaforge_voxel \
            -- --test-threads=4

      - name: Clippy (non-Bevy crates)
        run: |
          cargo clippy --workspace \
            --exclude novaforge_game \
            --exclude novaforge_game_app \
            --exclude novaforge_world \
            --exclude novaforge_voxel \
            -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

  # ── Legacy C++ reference build (informational, allowed to fail) ────────────
  cpp-legacy:
    name: C++ reference (informational)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DATLAS_BUILD_TESTS=ON \
            -DATLAS_ENABLE_ONLINE_DEPS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run C++ tests
        working-directory: build
        run: ctest --output-on-failure --parallel 4

