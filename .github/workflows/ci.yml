# AtlasWorkspace — CI Pipeline
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-linux:
    name: Linux Debug (ci-debug)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build g++

      - name: Configure
        run: |
          mkdir -p Logs
          cmake --preset ci-debug 2>&1 | tee Logs/configure-linux-debug.log

      - name: Build
        run: cmake --build --preset ci-debug 2>&1 | tee Logs/build-linux-debug.log

      - name: Test
        run: ctest --preset ci-debug --output-on-failure 2>&1 | tee Logs/test-linux-debug.log

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-linux-debug
          path: Logs/
          retention-days: 7

  build-linux-release:
    name: Linux Release (ci-release)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build g++

      - name: Configure
        run: |
          mkdir -p Logs
          cmake --preset ci-release 2>&1 | tee Logs/configure-linux-release.log

      - name: Build
        run: cmake --build --preset ci-release 2>&1 | tee Logs/build-linux-release.log

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-linux-release
          path: Logs/
          retention-days: 7

  build-multiconfig:
    name: Multi-Config (VS .sln equivalent)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build g++

      - name: Configure
        run: |
          mkdir -p Logs
          cmake -G "Ninja Multi-Config" -B Builds/multiconfig \
            -DATLAS_BUILD_TESTS=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            2>&1 | tee Logs/configure-multiconfig.log

      - name: Build Debug
        run: cmake --build Builds/multiconfig --config Debug 2>&1 | tee Logs/build-multiconfig-debug.log

      - name: Build Release
        run: cmake --build Builds/multiconfig --config Release 2>&1 | tee Logs/build-multiconfig-release.log

      - name: Test (Debug)
        run: cd Builds/multiconfig && ctest -C Debug --output-on-failure 2>&1 | tee ../../Logs/test-multiconfig-debug.log

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-multiconfig
          path: Logs/
          retention-days: 7

  build-windows:
    name: Windows (VS 2022 / MSVC)
    runs-on: windows-2022
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Configure (VS 2022 preset)
        run: |
          New-Item -ItemType Directory -Force -Path Logs | Out-Null
          cmake --preset vs2022 2>&1 | Tee-Object -FilePath Logs\configure-windows-debug.log

      - name: Build Debug
        run: cmake --build --preset vs2022-debug 2>&1 | Tee-Object -FilePath Logs\build-windows-debug.log

      - name: Test (Debug)
        run: ctest --preset vs2022 --output-on-failure 2>&1 | Tee-Object -FilePath Logs\test-windows-debug.log

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-windows-debug
          path: Logs/
          retention-days: 7

  build-windows-release:
    name: Windows Release (VS 2022 / MSVC)
    runs-on: windows-2022
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Configure (windows-x64 preset)
        run: |
          New-Item -ItemType Directory -Force -Path Logs | Out-Null
          cmake --preset windows-x64 2>&1 | Tee-Object -FilePath Logs\configure-windows-release.log

      - name: Build Release
        run: cmake --build --preset windows-x64-release 2>&1 | Tee-Object -FilePath Logs\build-windows-release.log

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-windows-release
          path: Logs/
          retention-days: 7
